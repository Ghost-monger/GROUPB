{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log In</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'css/main.css'%}">
         <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bf-black: #080608;
            --bf-dark: #0f0a0d;
            --bf-card: #120d10;
            --bf-crimson: #8b0000;
            --bf-red: #c0152a;
            --bf-flash: #e8001a;
            --bf-glow: #ff1a35;
            --bf-gold: #c9a84c;
            --bf-text: #e8dde2;
            --bf-muted: #7a6068;
            --bf-border: rgba(192, 21, 42, 0.35);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bf-black);
            background-image:
                radial-gradient(ellipse at 15% 20%, rgba(139, 0, 0, 0.2) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 80%, rgba(192, 21, 42, 0.12) 0%, transparent 55%),
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238b0000' fill-opacity='0.03'%3E%3Cpath d='M40 0 L80 40 L40 80 L0 40 Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            color: var(--bf-text);
        }

        @keyframes blackFlash {
            0%, 95%, 100% { opacity: 0; }
            96% { opacity: 0.06; background: white; }
            97% { opacity: 0; }
            98% { opacity: 0.03; background: white; }
        }

        @keyframes cursedPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(232, 0, 26, 0.2), 0 0 50px rgba(139, 0, 0, 0.1); }
            50% { box-shadow: 0 0 35px rgba(232, 0, 26, 0.35), 0 0 80px rgba(139, 0, 0, 0.18); }
        }

        @keyframes borderFlicker {
            0%, 100% { border-color: rgba(192, 21, 42, 0.35); }
            50% { border-color: rgba(232, 0, 26, 0.65); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scanLine {
            0%  { top: 0%; }
            100% { top: 100%; }
        }

        @keyframes runeFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.05; }
            50% { transform: translateY(-12px) rotate(4deg); opacity: 0.09; }
        }

        /* Black Flash flicker overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            animation: blackFlash 12s ease-in-out infinite;
        }

        /* Sukuna kanji watermark */
        body::after {
            content: '滅';
            position: fixed;
            bottom: -30px;
            right: 30px;
            font-size: 280px;
            color: var(--bf-crimson);
            opacity: 0.04;
            font-family: serif;
            pointer-events: none;
            animation: runeFloat 8s ease-in-out infinite;
            z-index: 0;
        }

        /* ── ALERT ── */
        .container.rounded .alert-danger {
            background: rgba(139, 0, 0, 0.15) !important;
            border: 1px solid rgba(192, 21, 42, 0.4) !important;
            color: #f87171 !important;
            border-radius: 2px !important;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 0.03em;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* ── CARD ── */
        .card {
            background: linear-gradient(160deg, #120d10 0%, #0e090c 100%) !important;
            border: 1px solid var(--bf-border) !important;
            border-radius: 2px !important;
            animation: slideUp 0.6s ease forwards, cursedPulse 5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        /* Corner bracket marks */
        .card::before,
        .card::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--bf-flash);
            border-style: solid;
            opacity: 0.5;
            z-index: 2;
            pointer-events: none;
        }
        .card::before { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
        .card::after  { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

        /* Scan line */
        .card-title ~ * {
            position: relative;
        }

        .card .p-4 {
            position: relative;
        }

        .card::before {
            z-index: 2;
        }

        /* Animated scan line inside card */
        .card .scan-fx {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--bf-flash), transparent);
            animation: scanLine 4s linear infinite;
            opacity: 0.25;
            pointer-events: none;
        }

        .shadow-sm {
            box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 30px rgba(139,0,0,0.12) !important;
        }

        /* ── TITLE ── */
        .card-title {
            font-family: 'Cinzel Decorative', serif !important;
            font-size: 1.05rem !important;
            font-weight: 700 !important;
            color: #ffffff !important;
            text-shadow: 0 0 18px rgba(232, 0, 26, 0.7), 0 0 35px rgba(139, 0, 0, 0.4);
            letter-spacing: 0.04em;
        }

        /* ── LABELS ── */
        .form-label {
            color: var(--bf-muted) !important;
            font-family: 'Rajdhani', sans-serif !important;
            font-weight: 600 !important;
            font-size: 0.78rem !important;
            text-transform: uppercase !important;
            letter-spacing: 0.12em !important;
            margin-bottom: 0.35rem !important;
            display: block !important;
        }

        .form-label::before {
            content: '▸ ';
            color: var(--bf-red);
            font-size: 0.72rem;
        }

        /* ── INPUT GROUP ── */
        .input-group-text {
            background: rgba(139, 0, 0, 0.2) !important;
            border: 1px solid var(--bf-border) !important;
            border-right: none !important;
            color: var(--bf-red) !important;
            border-radius: 2px 0 0 2px !important;
            animation: borderFlicker 4s ease-in-out infinite;
        }

        .form-control {
            background: rgba(10, 6, 8, 0.85) !important;
            border: 1px solid var(--bf-border) !important;
            border-left: none !important;
            border-radius: 0 2px 2px 0 !important;
            color: var(--bf-text) !important;
            font-family: 'Rajdhani', sans-serif !important;
            font-size: 0.95rem !important;
            font-weight: 500 !important;
            transition: all 0.3s ease !important;
            animation: borderFlicker 4s ease-in-out infinite;
        }

        .form-control:focus {
            background: rgba(26, 8, 12, 0.95) !important;
            border-color: var(--bf-flash) !important;
            box-shadow: 0 0 0 3px rgba(232, 0, 26, 0.15), 0 0 15px rgba(232, 0, 26, 0.1) !important;
            color: #ffffff !important;
            outline: none !important;
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--bf-flash) !important;
            color: var(--bf-flash) !important;
        }

        .form-control::placeholder {
            color: rgba(122, 96, 104, 0.6) !important;
            font-style: italic;
        }

        /* ── LOG IN BUTTON ── */
        .btn-primary {
            background: linear-gradient(135deg, var(--bf-crimson) 0%, var(--bf-red) 50%, #9a0f22 100%) !important;
            border: 1px solid var(--bf-flash) !important;
            color: #ffffff !important;
            font-family: 'Cinzel Decorative', serif !important;
            font-weight: 700 !important;
            font-size: 0.85rem !important;
            letter-spacing: 0.1em !important;
            border-radius: 2px !important;
            padding: 0.75rem !important;
            transition: all 0.3s ease !important;
            position: relative !important;
            overflow: hidden !important;
            text-shadow: 0 0 10px rgba(255, 80, 80, 0.4);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: -100%; left: -100%;
            width: 300%; height: 300%;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.07) 50%, transparent 60%);
            transition: all 0.5s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--bf-red) 0%, var(--bf-flash) 50%, var(--bf-red) 100%) !important;
            box-shadow: 0 0 25px rgba(232, 0, 26, 0.55), 0 6px 20px rgba(139, 0, 0, 0.4) !important;
            transform: translateY(-2px) !important;
        }

        .btn-primary:hover::before {
            top: 100%; left: 100%;
        }

        .btn-primary:active {
            transform: translateY(0) !important;
        }

        /* ── FOOTER TEXT ── */
        .text-muted {
            color: var(--bf-muted) !important;
            font-size: 0.85rem;
        }

        a.fw-semibold {
            color: var(--bf-gold) !important;
            text-decoration: none !important;
            font-weight: 700 !important;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }

        a.fw-semibold:hover {
            color: #e8c86a !important;
            text-shadow: 0 0 10px rgba(201, 168, 76, 0.4);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bf-black); }
        ::-webkit-scrollbar-thumb { background: var(--bf-crimson); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--bf-flash); }
    </style>
</head>
<body>
<div class="container rounded">
{% if messages %}
  {% for message in messages %}
    <div class="alert alert-danger" role="alert">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}<br>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">

    <h3 class="card-title text-center mb-4 fw-bold">Welcome Back</h3>

    <form action="" method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="username" id="username"
            placeholder="Enter your username" class="form-control">
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" id="password"
            placeholder="Enter your password" class="form-control">
        </div>
      </div>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary btn-lg">Log In</button>
      </div>

      <p class="text-center text-muted mb-0">
        Don't have an account?
        <a href="{% url 'signup' %}" class="text-decoration-none fw-semibold">Register Here</a>
      </p>

    </form>
  </div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
