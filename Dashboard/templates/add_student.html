{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css'%}">
     <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bf-black: #080608;
            --bf-dark: #0f0a0d;
            --bf-card: #120d10;
            --bf-crimson: #8b0000;
            --bf-red: #c0152a;
            --bf-flash: #e8001a;
            --bf-glow: #ff1a35;
            --bf-gold: #c9a84c;
            --bf-text: #e8dde2;
            --bf-muted: #7a6068;
            --bf-border: rgba(192, 21, 42, 0.35);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bf-black) !important;
            background-image:
                radial-gradient(ellipse at 15% 20%, rgba(139, 0, 0, 0.2) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 80%, rgba(192, 21, 42, 0.12) 0%, transparent 55%),
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238b0000' fill-opacity='0.03'%3E%3Cpath d='M40 0 L80 40 L40 80 L0 40 Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            font-family: 'Rajdhani', sans-serif;
            color: var(--bf-text);
        }

        @keyframes blackFlash {
            0%, 95%, 100% { opacity: 0; }
            96% { opacity: 0.06; background: white; }
            97% { opacity: 0; }
            98% { opacity: 0.03; background: white; }
        }

        @keyframes cursedPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(232, 0, 26, 0.2), 0 0 50px rgba(139, 0, 0, 0.1); }
            50% { box-shadow: 0 0 35px rgba(232, 0, 26, 0.35), 0 0 80px rgba(139, 0, 0, 0.18); }
        }

        @keyframes borderFlicker {
            0%, 100% { border-color: rgba(192, 21, 42, 0.35); }
            50% { border-color: rgba(232, 0, 26, 0.65); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scanLine {
            0%  { top: 0%; }
            100% { top: 100%; }
        }

        @keyframes runeFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.05; }
            50% { transform: translateY(-12px) rotate(4deg); opacity: 0.09; }
        }

        /* Black Flash flicker overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            animation: blackFlash 12s ease-in-out infinite;
        }

        /* Sukuna kanji watermark */
        body::after {
            content: '王';
            position: fixed;
            bottom: -30px;
            right: 30px;
            font-size: 280px;
            color: var(--bf-crimson);
            opacity: 0.04;
            font-family: serif;
            pointer-events: none;
            animation: runeFloat 8s ease-in-out infinite;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* ── CARD ── */
        .card {
            background: linear-gradient(160deg, #120d10 0%, #0e090c 100%) !important;
            border: 1px solid var(--bf-border) !important;
            border-radius: 2px !important;
            animation: slideDown 0.6s ease forwards, cursedPulse 5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .card::before,
        .card::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--bf-flash);
            border-style: solid;
            opacity: 0.5;
            z-index: 2;
            pointer-events: none;
        }
        .card::before { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
        .card::after  { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

        .shadow {
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(139,0,0,0.12) !important;
        }

        /* ── CARD HEADER ── */
        .card-header {
            background: linear-gradient(90deg, #1a0508 0%, #2a0810 50%, #1a0508 100%) !important;
            border-bottom: 2px solid var(--bf-crimson) !important;
            padding: 1.1rem 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 40px,
                rgba(232, 0, 26, 0.04) 40px,
                rgba(232, 0, 26, 0.04) 41px
            );
        }

        .card-header::after {
            content: '⛧';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            opacity: 0.35;
            color: var(--bf-gold);
            animation: runeFloat 4s ease-in-out infinite;
        }

        .card-header h4 {
            font-family: 'Cinzel Decorative', serif !important;
            font-size: 0.95rem !important;
            font-weight: 700 !important;
            color: #ffffff !important;
            text-shadow: 0 0 15px rgba(232, 0, 26, 0.7), 0 0 30px rgba(139, 0, 0, 0.4);
            letter-spacing: 0.04em;
            margin-bottom: 0 !important;
        }

        /* ── CARD BODY ── */
        .card-body {
            padding: 1.8rem;
            position: relative;
        }

        .card-body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--bf-flash), transparent);
            animation: scanLine 4s linear infinite;
            opacity: 0.25;
            pointer-events: none;
            z-index: 1;
        }

        /* ── LABELS ── */
        .form-label {
            color: var(--bf-muted) !important;
            font-family: 'Rajdhani', sans-serif !important;
            font-weight: 600 !important;
            font-size: 0.78rem !important;
            text-transform: uppercase !important;
            letter-spacing: 0.12em !important;
            margin-bottom: 0.35rem !important;
            display: block !important;
        }

        .form-label::before {
            content: '▸ ';
            color: var(--bf-red);
            font-size: 0.72rem;
        }

        /* ── INPUTS ── */
        .form-control,
        .form-select {
            background: rgba(10, 6, 8, 0.85) !important;
            border: 1px solid var(--bf-border) !important;
            border-radius: 2px !important;
            color: var(--bf-text) !important;
            font-family: 'Rajdhani', sans-serif !important;
            font-size: 0.95rem !important;
            font-weight: 500 !important;
            transition: all 0.3s ease !important;
            animation: borderFlicker 5s ease-in-out infinite;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(26, 8, 12, 0.95) !important;
            border-color: var(--bf-flash) !important;
            box-shadow: 0 0 0 3px rgba(232, 0, 26, 0.15), 0 0 15px rgba(232, 0, 26, 0.1) !important;
            color: #ffffff !important;
            outline: none !important;
        }

        .form-control::placeholder {
            color: rgba(122, 96, 104, 0.5) !important;
            font-style: italic;
        }

        .form-select option {
            background: #120d10;
            color: var(--bf-text);
        }

        input[type="file"].form-control {
            padding: 0.45rem 0.9rem !important;
            cursor: pointer;
        }

        input[type="file"].form-control::-webkit-file-upload-button {
            background: linear-gradient(135deg, var(--bf-crimson), var(--bf-red));
            border: none;
            border-radius: 2px;
            color: white;
            padding: 4px 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            cursor: pointer;
            margin-right: 10px;
            text-transform: uppercase;
        }

        /* ── BOTTOM BUTTONS ── */
        .d-flex.justify-content-between {
            margin-top: 1.8rem;
            padding-top: 1.2rem;
            border-top: 1px solid rgba(139, 0, 0, 0.2);
            position: relative;
        }

        .d-flex.justify-content-between::before {
            content: '— 王 —';
            position: absolute;
            top: -0.75rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--bf-muted);
            letter-spacing: 0.2em;
            background: #120d10;
            padding: 0 12px;
            white-space: nowrap;
        }

        .btn-secondary {
            background: transparent !important;
            border: 1px solid rgba(122, 96, 104, 0.4) !important;
            color: var(--bf-muted) !important;
            font-family: 'Rajdhani', sans-serif !important;
            font-weight: 600 !important;
            font-size: 0.82rem !important;
            letter-spacing: 0.1em !important;
            text-transform: uppercase !important;
            border-radius: 2px !important;
            padding: 0.5rem 1.4rem !important;
            transition: all 0.3s ease !important;
            text-decoration: none !important;
            display: inline-flex !important;
            align-items: center !important;
        }

        .btn-secondary:hover {
            background: rgba(122, 96, 104, 0.1) !important;
            border-color: var(--bf-muted) !important;
            color: var(--bf-text) !important;
            transform: translateY(-1px) !important;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--bf-crimson) 0%, var(--bf-red) 50%, #9a0f22 100%) !important;
            border: 1px solid var(--bf-flash) !important;
            color: #ffffff !important;
            font-family: 'Rajdhani', sans-serif !important;
            font-weight: 700 !important;
            font-size: 0.82rem !important;
            letter-spacing: 0.12em !important;
            text-transform: uppercase !important;
            border-radius: 2px !important;
            padding: 0.5rem 1.6rem !important;
            transition: all 0.3s ease !important;
            position: relative !important;
            overflow: hidden !important;
        }

        .btn-success::before {
            content: '';
            position: absolute;
            top: -100%; left: -100%;
            width: 300%; height: 300%;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.07) 50%, transparent 60%);
            transition: all 0.5s ease;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, var(--bf-red) 0%, var(--bf-flash) 50%, var(--bf-red) 100%) !important;
            box-shadow: 0 0 22px rgba(232, 0, 26, 0.5), 0 5px 18px rgba(139, 0, 0, 0.4) !important;
            transform: translateY(-2px) !important;
        }

        .btn-success:hover::before {
            top: 100%; left: 100%;
        }

        .btn-success:active {
            transform: translateY(0) !important;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bf-black); }
        ::-webkit-scrollbar-thumb { background: var(--bf-crimson); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--bf-flash); }
    </style>
</head>
<body class="bg-info-subtle">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Add New Student</h4>
                </div>

                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                         <div class="mb-3">
                            <label class="form-label">Student Image</label>
                            <input type="file" name="image" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Course</label>
                            <input type="text" name="course" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" name="age" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select" aria-label="Default select example">
                              <option value> Select Gender</option>
                              <option value> Male</option>
                              <option value>Female</option>

                            </select>
                        </div>

                          <div class="mb-3">
                            <label class="form-label">Date</label>
                            <input type="date" name="date" class="form-control" required>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-success">Save Student</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
