{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>M-Pesa Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --mp-green: #00a651;
            --mp-green-dark: #007a3d;
            --mp-green-deep: #005c2e;
            --mp-green-glow: rgba(0, 166, 81, 0.35);
            --mp-black: #0d0d0d;
            --mp-card: #1a1a1a;
            --mp-border: rgba(0, 166, 81, 0.25);
            --mp-text: #f0f0f0;
            --mp-muted: #6b6b6b;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--mp-black);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(0, 166, 81, 0.12) 0%, transparent 60%),
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,166,81,0.03) 39px, rgba(0,166,81,0.03) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,166,81,0.03) 39px, rgba(0,166,81,0.03) 40px);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            padding: 2rem;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGreen {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,166,81,0.4); }
            50%       { box-shadow: 0 0 0 8px rgba(0,166,81,0); }
        }

        @keyframes scanDown {
            0%   { top: -2px; opacity: 0.6; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-4px); }
        }

        @keyframes dotBlink {
            0%, 80%, 100% { opacity: 0; transform: scale(0.6); }
            40%            { opacity: 1; transform: scale(1); }
        }

        /* ── WRAPPER — constrains everything to a centered card ── */
        .mpesa-wrapper {
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .mpesa-card {
            background: var(--mp-card);
            border: 1px solid var(--mp-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(0,166,81,0.08),
                0 24px 60px rgba(0,0,0,0.7),
                0 0 40px rgba(0,166,81,0.06);
            position: relative;
        }

        /* Scan line */
        .mpesa-card::before {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--mp-green), transparent);
            top: -2px;
            animation: scanDown 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 10;
        }

        /* ── HEADER ── */
        .mpesa-header {
            background: linear-gradient(135deg, #005c2e 0%, #007a3d 50%, #00a651 100%);
            padding: 2rem 2rem 1.6rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .mpesa-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,0.02) 8px, rgba(255,255,255,0.02) 9px);
        }

        .mpesa-header::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .mpesa-logo {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            animation: logoFloat 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        .mpesa-logo-m,
        .mpesa-logo-pesa {
            font-size: 2.6rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            letter-spacing: -1px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .mpesa-logo-m { letter-spacing: -2px; }

        .mpesa-logo-dot {
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 50%;
            margin-bottom: 18px;
            box-shadow: 0 0 8px rgba(255,255,255,0.8);
        }

        .mpesa-tagline {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            margin-top: 0.4rem;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        /* ── BODY ── */
        .mpesa-body {
            padding: 2rem;
        }

        .mpesa-title {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--mp-green);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 1.4rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mpesa-title::before,
        .mpesa-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--mp-border);
        }

        /* ── INPUTS ── */
        .input-wrap {
            position: relative;
            margin-bottom: 1rem;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            pointer-events: none;
            z-index: 2;
            color: var(--mp-muted);
            transition: color 0.3s ease;
        }

        .input-wrap:focus-within .input-icon {
            color: var(--mp-green);
        }

        .amount-prefix {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78rem;
            color: var(--mp-green);
            font-weight: 700;
            pointer-events: none;
            z-index: 2;
            letter-spacing: 0.04em;
        }

        .form-control {
            background: rgba(255,255,255,0.04) !important;
            border: 1.5px solid rgba(0,166,81,0.2) !important;
            border-radius: 10px !important;
            color: var(--mp-text) !important;
            font-family: 'Nunito', sans-serif !important;
            font-size: 0.95rem !important;
            font-weight: 600 !important;
            padding: 0.8rem 1rem 0.8rem 3rem !important;
            width: 100% !important;
            transition: all 0.3s ease !important;
            caret-color: var(--mp-green);
        }

        .form-control:focus {
            background: rgba(0,166,81,0.06) !important;
            border-color: var(--mp-green) !important;
            box-shadow: 0 0 0 3px rgba(0,166,81,0.15) !important;
            color: #ffffff !important;
            outline: none !important;
        }

        .form-control::placeholder {
            color: var(--mp-muted) !important;
            font-weight: 400 !important;
        }

        input[name="amount"] {
            padding-left: 3.8rem !important;
            font-family: 'Share Tech Mono', monospace !important;
            letter-spacing: 0.05em !important;
        }

        /* ── BUTTON ── */
        .btn-success {
            width: 100% !important;
            background: linear-gradient(135deg, var(--mp-green-dark) 0%, var(--mp-green) 100%) !important;
            border: none !important;
            border-radius: 10px !important;
            color: #ffffff !important;
            font-family: 'Nunito', sans-serif !important;
            font-weight: 800 !important;
            font-size: 0.9rem !important;
            letter-spacing: 0.14em !important;
            padding: 0.9rem !important;
            margin-top: 0.5rem !important;
            transition: all 0.3s ease !important;
            position: relative !important;
            overflow: hidden !important;
            animation: pulseGreen 2.5s ease-in-out infinite;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #007a3d 0%, #00c45f 100%) !important;
            box-shadow: 0 8px 25px rgba(0,166,81,0.45) !important;
            transform: translateY(-2px) !important;
        }

        .btn-success:active {
            transform: translateY(0) scale(0.98) !important;
        }

        /* ── FOOTER ── */
        .mpesa-footer {
            text-align: center;
            padding: 0 2rem 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .mpesa-footer-text {
            font-size: 0.7rem;
            color: var(--mp-muted);
            letter-spacing: 0.04em;
        }

        .mpesa-secure-dots {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .mpesa-secure-dots span {
            width: 5px;
            height: 5px;
            background: var(--mp-green);
            border-radius: 50%;
            display: inline-block;
        }

        .mpesa-secure-dots span:nth-child(1) { animation: dotBlink 1.4s ease-in-out infinite 0s; }
        .mpesa-secure-dots span:nth-child(2) { animation: dotBlink 1.4s ease-in-out infinite 0.2s; }
        .mpesa-secure-dots span:nth-child(3) { animation: dotBlink 1.4s ease-in-out infinite 0.4s; }

        ::selection { background: rgba(0,166,81,0.35); color: #fff; }
    </style>
</head>
<body>

    <!-- ── PASTE THIS BLOCK wherever you want the form to appear ── -->
    <div class="mpesa-wrapper">
        <div class="mpesa-card">

            <div class="mpesa-header">
                <div class="mpesa-logo">
                    <span class="mpesa-logo-m">M</span>
                    <div class="mpesa-logo-dot"></div>
                    <span class="mpesa-logo-pesa">Pesa</span>
                </div>
                <div class="mpesa-tagline">Secure Mobile Payment</div>
            </div>

            <div class="mpesa-body">
                <div class="mpesa-title">STK Push</div>
                <div class="container rounded">
                    {% if messages %}
                      {% for message in messages %}
                        <div class="alert alert-danger" role="alert">
                          {{ message }}
                        </div>
                      {% endfor %}
                    {% endif %}<br>


                <!-- ↓↓ YOUR ORIGINAL FORM — UNTOUCHED ↓↓ -->
                <form action="" method="POST">
                    {% csrf_token %}

                    <div class="input-wrap">
                        <span class="input-icon">📱</span>
                        <input type="text" name="phone" placeholder="Enter Phone Number"
                        class="form-control" required>
                    </div>

                    <div class="input-wrap">
                        <span class="amount-prefix">KSh</span>
                        <input type="number" name="amount" placeholder="Enter Amount"
                        class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-success">SEND PROMPT</button>
                </form>
                <!-- ↑↑ END ORIGINAL FORM ↑↑ -->

            </div>

            <div class="mpesa-footer">
                <div class="mpesa-secure-dots"><span></span><span></span><span></span></div>
                <span class="mpesa-footer-text">Secured by Safaricom M-Pesa</span>
                <div class="mpesa-secure-dots"><span></span><span></span><span></span></div>
            </div>

        </div>
    </div>

    <!-- ── END PASTE BLOCK ── -->

</body>
</html>
